<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #000000;
    --btn-bg: #01254b;
    --btn-hover: #01264c;
  }

  [data-theme="white"] {
    --bg-color: #ffffff;
    --text-color: #000000;
    --btn-bg: #01254b;
    --btn-hover: #01264c;
  }

  [data-theme="dark"] {
    --bg-color: #121212;
    --text-color: #f0f0f0;
    --btn-bg: #333;
    --btn-hover: #555;
  }

  [data-theme="blue"] {
    --bg-color: #1e1e4f;
    --text-color: #ffffff;
    --btn-bg: #4c65dd;
    --btn-hover: #728dff;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background: var(--bg-color);
    color: var(--text-color);
    transition: background 0.3s ease, color 0.3s ease;
  }

  #text {
    padding: 12px 16px;
    font-size: 17px;
    width: 280px;
    border: 2px solid #ccc;
    border-radius: 10px;
    margin-right: 10px;
    outline: none;
    transition: 0.3s ease;
  }

  #text:focus {
    border-color: var(--btn-bg);
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
  }

.input-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 70vh; /* takes up 70% of viewport height */
  gap: 20px;
}
.input-center-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}


  .questions {
    background: var(--bg-color);
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease;
  }

  .questions h2 {
    color: var(--text-color);
    font-size: 30px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 25px;
    padding: 10px 20px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.05);
  }

  .q_1, .q_2, .q_3, .q_4, .q_5, .q_6, .q_7, .q_8, .q_9, .q_10 {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .questions button {
    width: 260px;
    padding: 12px 18px;
    font-size: 17px;
    font-weight: 500;
    border: none;
    border-radius: 12px;
    background-color: var(--btn-bg);
    color: white;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
    transition: background-color 0.25s ease, transform 0.1s ease;
  }

  .questions button:hover {
    background-color: var(--btn-hover);
    transform: scale(1.02);
  }

  .next-fixed {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 12px;
    z-index: 1000;
  }

  #startQuizBtn {
    padding: 12px 20px;
    font-size: 17px;
    font-weight: 500;
    background-color: var(--btn-bg);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background-color 0.25s ease, transform 0.1s ease;
  }

  #startQuizBtn:hover {
    background-color: var(--btn-hover);
    transform: scale(1.02);
  }

  .theme-switcher {
    position: fixed;
    top: 12px;
    right: 20px;
    z-index: 1000;
  }

  .theme-switcher select {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    border: 1px solid #ccc;
    background: var(--bg-color);
    color: var(--text-color);
  }

  #chartPage {
    display: none;
    padding: 30px;
    text-align: center;
  }

  #nextToAnalysis {
    padding: 12px 20px;
    background-color: var(--btn-bg);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }

  #nextToAnalysis:hover {
    background-color: var(--btn-hover);
  }
 #logo-wrapper {
  position: fixed; /* or absolute if you prefer */
  top: 0;
  left: 0;
  z-index: 1000;
  padding: 0;
  margin: 0;
}

#logo {

#logo:hover {

.input-header h2 {
  text-align: center;
  margin-top: 40px;
}

</style>

</head>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDy0I8E60PAIf7DnIv2-fu4eZK50OGHifM",
    authDomain: "login-interview-b2d85.firebaseapp.com",
    databaseURL: "https://login-interview-b2d85-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "login-interview-b2d85", 
    storageBucket: "login-interview-b2d85.appspot.com",
    messagingSenderId: "467565649214", 
    appId: "1:467565649214:web:d4dee8fa95692320c6606f"
  };
  firebase.initializeApp(firebaseConfig);

  // Initialize the Realtime Database instance
  const db = firebase.database();
  // Declare currentUser variable
  let currentUser = null;

  window.userSubscription = null;
  firebase.auth().onAuthStateChanged((user) => {
    // Set currentUser inside the auth state listener
    currentUser = user;

    if (user) {
      console.log("User is logged in (quiz page):", user.uid);
      const subscriptionRef = firebase.database().ref(`userProfiles/${user.uid}/subscription`);

      subscriptionRef.once('value')
        .then((snapshot) => {
          if (snapshot.exists()) {
            window.userSubscription = snapshot.val();
            console.log("Subscription level (quiz page):", window.userSubscription);
          } else {
            window.userSubscription = 'free';
            console.log("No specific subscription data found for user. Defaulting to free.");
          }
        })
        .catch((error) => {
          console.error("Error fetching subscription (quiz page):", error);
          window.userSubscription = 'error_fetching'; // Indicate an error
        });
    } else {
      console.log("No user is logged in (quiz page).");
      window.userSubscription = 'logged_out'; 
    }
  });

  window.checkFeatureAccess = (requiredLevel) => {
    if (!window.userSubscription || window.userSubscription === 'logged_out' || window.userSubscription === 'error_fetching') {
      alert("Please log in or check your connection to access features.");
      return false;
    }
    if (window.userSubscription === 'premium') {
      return true; 
    }
    if (requiredLevel === 'free' && window.userSubscription === 'free') {
      return true; 
    }
    alert("This feature requires a Premium subscription!");
    return false;
  };

  async function submitQuiz() {
    let correct = 0;
    let wrong = 0;
    for(let i=0;i<10;i++){
        if (answerMatch[i].toUpperCase() === useranswer[i].toUpperCase()) correct++;
        else wrong++;
    }

    // Immediate alert for the final score
    alert(`Quiz Complete! Your score: ${correct} out of 10!`);

    console.log("Correct Answers:", correct);
    console.log("Wrong Answers:", wrong);
    console.log("🧠 Topic Name:", topic1);
    const scoreRef = db.ref(`userProfiles/${currentUser.uid}/scores/quizscore/${topic1}`);
    try {
      const snapshot = await scoreRef.once('value');
      const prevScore = snapshot.exists() ? snapshot.val().score : 0;

      if (correct > prevScore) {
        await scoreRef.set({ score: correct }); 
        console.log("New high score saved!");
      } else {
        console.log("Current score not higher than previous high score.");
      }
    } catch (error) {
      console.error("Error saving score to Firebase:", error);
      // Optionally alert user or handle error gracefully if saving fails
      alert("Could not save your score. Please check your login status or connection.");
    }


    document.getElementById("q10").style.display="none";
    document.getElementById("chartPage").style.display = "block";
    const ctx = document.getElementById('resultChart').getContext('2d');
    new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Correct', 'Wrong'],
        datasets: [{
          data: [correct, wrong],
          backgroundColor: ['green', 'red']
        }]
      },
      options: {
        plugins: {
          legend: { position: 'bottom' },
          title: {
            display: true,
            text: 'Correct vs Wrong'
          }
        }
      }
    });
  }


  function showAnalysis() {
    document.getElementById("chartPage").style.display = "none";
    const page3 = document.getElementById("page3");
    page3.style.display = "block";

    // Apply background only during analysis
    page3.classList.add("analysis-mode");

    for (let i = 0; i < 10; i++) {
      const options = ['A', 'B', 'C', 'D'];

      for (let j = 0; j < 4; j++) {
        const optionId = `q${i + 1}o${j + 1}`;
        const optLetter = options[j];
        const btn = document.getElementById(optionId);
        if (!btn) continue;

        btn.disabled = true;
        btn.style.backgroundColor = "";

        if (optLetter === useranswer[i] && useranswer[i] !== answerMatch[i]) {
          btn.style.backgroundColor = "red";
        }

        if (optLetter === answerMatch[i]) {
          btn.style.backgroundColor = "green";
        }
      }

      const qDiv = document.getElementById(`q${i + 1}`);
      qDiv.style.display = "block";
      const nav = qDiv.querySelector(".next-fixed");
      if (nav) nav.style.display = "none";
    }
  }

</script>
