<!DOCTYPE html>
<html lang="en" data-theme="white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Topics Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --card-color: #ffffff;
      --card-title-color: #333;
      --card-desc-color: #666;
      --sidebar-bg: #1e1e4f;
      --sidebar-text: #ffffff;
      --sidebar-hover: #2b3b8e;
      --primary-color: #4361ee;
      --primary-dark: #3a56d4;
      --secondary-color: #3f37c9;
      --accent-color: #4895ef;
      --border-radius: 12px;
      --box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s ease;
    }

    [data-theme="white"] {
      --bg-color: #ffffff;
      --text-color: #000000;
      --card-color: #ffffff;
      --card-title-color: #333;
      --card-desc-color: #666;
      --sidebar-bg: #f8f8f8;
      --sidebar-text: #000000;
      --sidebar-hover: #dddddd;
      --primary-color: #4361ee;
      --primary-dark: #3a56d4;
    }

    [data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #f0f0f0;
      --card-color: #1f1f1f;
      --card-title-color: #ffffff;
      --card-desc-color: #bbbbbb;
      --sidebar-bg: #2a2a2a;
      --sidebar-text: #ffffff;
      --sidebar-hover: #333333;
      --primary-color: #4895ef;
      --primary-dark: #3a7bd5;
    }

    [data-theme="blue"] {
      --bg-color: linear-gradient(to right, #1e1e4f, #2b3b8e);
      --text-color: #ffffff;
      --card-color: #2b3b8e;
      --card-title-color: #ffffff;
      --card-desc-color: #ddddff;
      --sidebar-bg: #1e1e4f;
      --sidebar-text: #ffffff;
      --sidebar-hover: #2b3b8e;
      --primary-color: #4cc9f0;
      --primary-dark: #3a7bd5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      transition: background 0.4s ease, color 0.4s ease;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      padding: 30px 0;
      font-size: 2.2rem;
      color: var(--primary-color);
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
    }

    h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 4px;
      background: var(--accent-color);
      margin: 10px auto;
      border-radius: 2px;
    }

    /* Layout styles */
    .layout {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 60px); /* Adjust based on footer height */
    }

    .sidebar {
      width: 220px;
      background-color: var(--sidebar-bg);
      color: var(--sidebar-text);
      padding-top: 30px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    .sidebar-logo {
      font-size: 28px;
      text-align: center;
      margin-bottom: 95px;
    }

    .sidebar-menu {
      list-style-type: none;
      padding-left: 0;
      margin-top: 20px;
    }

    .sidebar-menu li {
      padding: 12px 20px;
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-bottom: 10px;
    }

    .sidebar-menu li:hover {
      background-color: var(--sidebar-hover);
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .sidebar.collapsed .sidebar-logo,
    .sidebar.collapsed .sidebar-menu li {
      text-align: center;
      padding: 12px 0;
    }

    .sidebar.collapsed .sidebar-menu li::before {
      margin-right: 0;
    }

    .sidebar.collapsed .sidebar-menu li span {
      display: none;
    }

    .toggle-btn {
      position: absolute;
      top: 85px;
      background-color: var(--sidebar-bg);
      border: none;
      color: var(--sidebar-text);
      font-size: 20px;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 0 5px 5px 0;
      z-index: 1001;
      transition: left 0.3s ease;
    }

    .toggle-btn:hover {
      background-color: var(--sidebar-hover);
      transform: scale(1.05);
    }

    .sidebar.collapsed + .main-content .toggle-btn {
      left: 60px;
    }

    .sidebar {
      transition: width 0.3s ease;
    }

    .main-content {
      margin-left: 220px;
      padding: 30px;
      flex: 1;
      transition: margin-left 0.3s ease;
      position: relative;
    }

    .sidebar.collapsed + .main-content {
      margin-left: 60px;
    }

    /* Content wrapper */
    .content-wrapper {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .topics-main {
      flex: 1;
      min-width: 0; /* Prevent flex item overflow */
    }
    
    .right-sidebar {
      width: 250px;
      position: sticky;
      top: 20px;
      height: fit-content;
      background: var(--card-color);
      border-radius: var(--border-radius);
      padding: 15px;
      box-shadow: var(--box-shadow);
    }
    
    .right-sidebar h3 {
      color: var(--primary-color);
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary-color);
    }
    
    .category-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .category-links a {
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text-color);
      text-decoration: none;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .category-links a:hover {
      background-color: var(--primary-color);
      color: white;
    }
    
    .category-links a i {
      width: 20px;
      text-align: center;
    }

    /* Topics container */
    .topics-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* Category section */
    .category-section {
      margin-bottom: 30px;
    }

    .category-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary-color);
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary-color);
      display: flex;
      align-items: center;
      scroll-margin-top: 100px;
    }

    .category-title i {
      margin-right: 10px;
      font-size: 1.3rem;
    }

    /* Topic card */
    .topic-row {
      background: var(--card-color);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 18px 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition);
      border-left: 4px solid var(--primary-color);
    }

    .topic-row:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topic-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--card-title-color);
    }

    .difficulty {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .easy {
      background: rgba(76, 201, 240, 0.2);
      color: #4cc9f0;
    }

    .medium {
      background: rgba(248, 150, 30, 0.2);
      color: #f8961e;
    }

    .hard {
      background: rgba(247, 37, 133, 0.2);
      color: #f72585;
    }

    .score-row {
      font-size: 0.9rem;
      color: var(--card-desc-color);
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .score-row i {
      color: #f8961e;
    }

    .actions {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    .actions button {
      padding: 10px 18px;
      font-size: 0.9rem;
      border: none;
      border-radius: var(--border-radius);
      background-color: var(--primary-color);
      color: white;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .actions button:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
    }

    .actions button i {
      font-size: 0.9rem;
    }

    /* Avatar dropdown */
    .dropdown {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 999;
    }

    .dropdown img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--primary-color);
    }

    #dropdownContent {
      display: none;
      background-color: var(--card-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      border-radius: var(--border-radius);
      padding: 10px;
      margin-top: 5px;
      width: 160px;
      position: absolute;
      right: 0;
    }

    #dropdownContent button {
      padding: 8px 12px;
      width: 100%;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 5px;
      background: var(--primary-color);
      color: white;
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }

    #dropdownContent button:hover {
      background: var(--primary-dark);
    }

    #dropdownContent label {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--card-desc-color);
      display: block;
      margin-top: 10px;
    }

    #themeSelect {
      margin-top: 4px;
      padding: 6px 8px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: var(--card-color);
      color: var(--text-color);
    }

    /* Logo */
    #logo-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      padding: 10px;
    }

    #logo {
      width: 80px;
      height: auto;
      display: block;
      transition: var(--transition);
    }

    #logo:hover {
      transform: scale(1.05);
    }

    /* Footer */
    #footer-container {
      margin-top: auto;
      width: 100%;
    }
.action-btn {
  position: relative;
  padding: 10px 18px;
  font-size: 0.9rem;
  border: none;
  border-radius: var(--border-radius);
  color: white;
  cursor: pointer;
  transition: var(--transition);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
}

.quiz-btn {
  background-color: var(--primary-color);
}

.fluency-btn {
  background-color: #4CAF50; /* Green color for fluency */
}

.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.action-btn .btn-hover-effect {
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: 0.5s;
}

.action-btn:hover .btn-hover-effect {
  left: 100%;
}

.star-rating {
  display: flex;
  align-items: center;
  gap: 2px;
}

.star-rating i {
  font-size: 0.9rem;
}

    /* Responsive adjustments */
    @media (max-width: 1200px) {
      .right-sidebar {
        display: none;
      }
      
      .content-wrapper {
        max-width: 100%;
      }
    }

    @media (max-width: 992px) {
      .sidebar {
        width: 60px;
      }
      
      .sidebar .sidebar-logo,
      .sidebar .sidebar-menu li {
        text-align: center;
        padding: 12px 0;
      }
      
      .sidebar .sidebar-menu li span {
        display: none;
      }
      
      .main-content {
        margin-left: 60px;
      }
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 20px 15px;
      }
      
      .topic-row {
        padding: 15px;
      }
      
      .actions {
        flex-direction: column;
        gap: 10px;
      }
      
      .actions button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

  async function fetchUserQuizScores(uid) {
    if (!uid) return {};
    const scoresRef = db.ref(`userProfiles/${uid}/scores/quizscore`);
    try {
      const snapshot = await scoresRef.once('value');
      if (snapshot.exists()) {
        const rawScores = snapshot.val();
        const normalizedScores = {};
        for (const topicKey in rawScores) {
          if (Object.prototype.hasOwnProperty.call(rawScores, topicKey)) {
            normalizedScores[topicKey.toLowerCase()] = rawScores[topicKey];
          }
        }
        return normalizedScores;
      }
      return {};
    } catch (error) {
      console.error("Error fetching user quiz scores:", error);
      return {};
    }
  }

// 2. Make it functional
const searchInput = document.getElementById('topicSearch');
const difficultyFilter = document.getElementById('difficultyFilter');
const resetButton = document.getElementById('resetFilters');

function filterTopics() {
  const searchTerm = searchInput.value.toLowerCase();
  const difficulty = difficultyFilter.value;
  
  let anyVisible = false;
  
  document.querySelectorAll('.topic-row').forEach(row => {
    const topicName = row.querySelector('.topic-name').textContent.toLowerCase();
    const topicDifficulty = row.querySelector('.difficulty').classList[1];
    
    const matchesSearch = searchTerm === '' || topicName.includes(searchTerm);
    const matchesDifficulty = difficulty === 'all' || topicDifficulty === difficulty;
    
    if (matchesSearch && matchesDifficulty) {
      row.style.display = 'flex';
      anyVisible = true;
    } else {
      row.style.display = 'none';
    }
    
    // Highlight search term
    if (searchTerm) {
      const nameElement = row.querySelector('.topic-name');
      const text = nameElement.textContent;
      const regex = new RegExp(searchTerm, 'gi');
      nameElement.innerHTML = text.replace(regex, match => 
        `<span style="background-color: #fff9c4;">${match}</span>`);
    }
  });

  // Handle empty state
  const emptyState = document.getElementById('topicsEmptyState') || 
    document.createElement('div');
    
  if (!anyVisible) {
    emptyState.id = 'topicsEmptyState';
    emptyState.innerHTML = `
      <div style="text-align: center; padding: 40px; color: #666;">
        <i class="fas fa-search" style="font-size: 24px; margin-bottom: 10px;"></i>
        <p>No topics found matching your criteria</p>
        <button onclick="resetFilters()" style="margin-top: 10px; padding: 8px 16px;
          background: #4361ee; color: white; border: none; border-radius: 4px;
          cursor: pointer;">
          Reset Filters
        </button>
      </div>
    `;
    document.querySelector('.topics-container').appendChild(emptyState);
  } else if (emptyState.parentNode) {
    emptyState.parentNode.removeChild(emptyState);
  }
}

function resetFilters() {
  searchInput.value = '';
  difficultyFilter.value = 'all';
  filterTopics();
}

searchInput.addEventListener('input', filterTopics);
difficultyFilter.addEventListener('change', filterTopics);
resetButton.addEventListener('click', resetFilters);
